spring:
    application:
        name: botguard

    datasource:
        url: jdbc:postgresql://localhost:5432/botguard
        username: botguard
        password: botguard

    jpa:
        hibernate:
            ddl-auto: validate
        properties:
            hibernate:
                format_sql: true
        open-in-view: false

    flyway:
        enabled: true
        locations: classpath:db/migration

    data:
        redis:
            host: localhost
            port: 6379

server:
    port: 8080

logging:
    level:
        org.hibernate.SQL: info
